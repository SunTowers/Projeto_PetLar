<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetLar - Entrar</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="home.html">PetLar</a>
      <nav class="site-nav">
        <a href="animal_listing.html">Animais</a>
      </nav>
      <div class="actions">
        <a class="button button-link" href="user_login.html">Entrar</a>
        <a class="button button-primary" href="user_registration.html">Cadastrar</a>
      </div>
    </div>
  </header>

  <main class="page-main">
    <div class="container page-intro">
      <span class="eyebrow">Login</span>
      <h1>Bem-vindo de volta</h1>
      <p>Entre para continuar acompanhando adoções, cadastrar animais e apoiar campanhas.</p>
    </div>

    <div class="container form-card">
      <form class="auth-form">
        <div class="label-group">
          <label for="email-login">E-mail</label>
          <input id="email-login" type="email" placeholder="seu@email.com">
        </div>
        <div class="label-group">
          <label for="password-login">Senha</label>
          <input id="password-login" type="password" placeholder="Digite sua senha">
        </div>
        <div class="form-actions">
          <button class="button button-primary" type="submit">Entrar</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>PetLar © 2026. Amor e cuidado para todos os animais.</p>
    </div>
  </footer>
</body>
</html>
